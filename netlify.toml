[[redirects]]
  from = "/partners/*"
  to = "/partners/index.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/partners/"
  status = 301

[build]
  command = "npm run build"
  publish = "dist"
[build]
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# SPA fallback (API handled by public/_redirects)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
